@EXPERIMENT_DEFINITION:HAS[#id[surfaceSample]]
{
    @RESULTS
    {
        AblissSrfLanded = As you collect the sample, you feel vines grow around you and the ground beneath starts to sink. You quickly retreat the container from the surface and everything is back to normal. Maybe you shouldn't take a surface sample from a living organism.
        BakewaveSrfLandedash = It's mostly igneous rock, with some ash mixed in.
        BakewaveSrfLandedbitterflow = It's snow!
        GarnsunSrfLanded = TOTALLY GARNULAR!!!!!!!!!!!!!!!!!
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    @RESULTS
    {
        AblissSrfLanded = The crew feels a sense of unease, as if they know they're not wanted here.
        AblissInSpaceLow = One of the crewmebers reports seeing the gargantuan vines on the planet trying to reach out for the ship.
        AblissInSpaceHigh = The crew reports several attempts by the orbital vines to ensare the craft.
        BakewaveSrfLandedash = Several crewmembers go to turn up the air conditioning, only to find it's already at it's max.
        BakewaveInSpaceLowash = One of the crewmembers turns up the air conditioning to the max setting in preperation for the surface below.
        BakewaveInSpaceHighash = One of the crewmembers turns up the air conditioning to the max setting in preperation for the surface below.
        BakewaveSrfLandedbitterflow = The crew is cold, but it's bearable for them.
        BakewaveInSpaceLowbitterflow = Looks cold down there.
        BakewaveInSpaceHighbitterflow = Looks cold down there.
        GarnsunInSpaceLow = The ship keeps getting hit by small dust particles.
        GarnsunInSpaceHigh = The crew reports high levels of Garnularity.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    @RESULTS
    {
        AblissSrfLanded = You get a feeling the planet doesn't want you here.
        AblissInSpaceLow = It feels like the planet is watching you.
        AblissInSpaceHigh = One of the massive vines tries ensaring you. It's very clear that Abliss wants you gone.
        BakewaveSrfLandedash = It feels like you're gonna melt.
        BakewaveInSpaceLowash = You can feel the heat from up here!
        BakewaveInSpaceHighash = You can feel the heat from up here!
        BakewaveSrfLandedbitterflow = Brr, it's cold!
        BakewaveInSpaceLowbitterflow = It looks a lot more bearable down there than the rest of the planet.
        BakewaveInSpaceHighbitterflow = It looks a lot more bearable down there than the rest of the planet.
        GarnsunInSpaceLow = You feel TOTALLY GARNULAR!!!!!!!!!!!!!!!!!!!!!!!!
        GarnsunInSpaceHigh = You feel garntastic!
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[mysteryGoo]]
{
    @RESULTS
    {
        AblissSrfLanded = The goo crawls out of it's container and merges with Abliss.
        AblissInSpaceLow = The goo reaches out towards Abliss.
        AblissInSpaceHigh = The goo gets out of the container and floats over to the vines.
        BakewaveSrfLandedash = The goo evaporates.
        BakewaveInSpaceLowash = The goo sticks a tendril outside to container only for it to evaporate.
        BakewaveInSpaceHighash = The goo sticks a tendril outside to container only for it to evaporate.
        BakewaveSrfLandedbitterflow = The goo freezes in the cold.
    }
}