@EXPERIMENT_DEFINITION:HAS[#id[surfaceSample]]
{
    @RESULTS
    {
        CarPlanetSrfLandedEyes = There's a lot of glass in this sample. Like, a lot. You start to wonder if Car's eyes are basically his glasses.
        CarPlanetSrfLandedNose = The sample feels very boopable.
        CarPlanetSrfLandedMouth = There's an awful lot of nothing in this sample.
        CarPlanetSrfLandedLowPolyCar = The ground here breaks apart into lots of little voxels. Weird.
        CarPlanetSrfLandedCloseCar = Certain parts of the sample contain sneek peeks to the next Garn47 update. You probably shouldn't show them to the rest of the crew though, they don't like spoilers.
        CarPlanetSrfLandedGrinCar = Analysis of the sample reveals high concentrations of dopamine.
        CarPlanetSrfLandedBoredCar = Looking at the sample makes you feel bored.
        CarPlanetSrfLandedRegularCar = There's a lot of fur in the sample.
        CarPlanetSrfLandedHappyCar = The sample has higher-than-normal concentrations of dopamine.
        CarPlanetSrfLandedWideCar = You're gonna need a wider container for this sample.
        CarPlanetSrfLandedPNGTuberCar = This sample looks like it's made of paper.
        CarPlanetSrfLandedDisgustedCar = The sample feels like it's covered in that gross garbage bag juice.
        CarPlanetSrfLandedgoog = Guh
        CarPlanetSrfLandedwowie = After seeing this sample, you can't help but say "Wowie!"
        CarPlanetSrfLandedEarring = There's some strange, pulsating crystals in here. I'm sure they aren't important to the lore.
        CarPlanetSrfLandedVoid = The sample is empty. You try collecting it again, but it remains empty.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
    @RESULTS
    {
        CarPlanetInSpaceHigh = That's a lot of Cars.
        CarPlanetInSpaceLow = That's a lot of Cars.
        CarPlanetSrfLanded = The crew feels safe here. There's some nice music, and Car's presence fills you with joy.
        CarPlanetSrfLandedVoid = Some members of the crew feel like there's something watching them. Mission Control is sure there's nothing to worry about.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    @RESULTS
    {
        CarPlanetInSpaceHigh = You get the feeling you're being silently watched. You see CAR watching you silently- in a reflection, perhaps. But just before you can look back, his eyes revert to staring in the deepest depths of space. //Thank you Mr. Earth for making this one. You saved me 30 seconds.
        CarPlanetInSpaceLow = You get the feeling you're being silently watched. You see CAR watching you silently- in a reflection, perhaps. But just before you can look back, his eyes revert to staring in the deepest depths of space
        CarPlanetSrfLanded = It's nice out here. You want to take off your helmet, but Mission Control warned you that high levels of dopamine in the atmosphere could kill you if you breathed the air.
        CarPlanetSrfLandedVoid = You feel like something is watching you. Mission control assures you it's nothing to worry about.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[mysteryGoo]]
{
    @RESULTS
    {
        CarPlanetInSpaceHigh = The goo shapes itself to resemble Car's face. How cute ˶ᵔ ᵕ ᵔ˶
        CarPlanetInSpaceLow = The goo shapes itself to resemble Car. It looks like it's trying to sing Car's Little Song. SUPER CUTE!!!!!!!!!!
        CarPlanetSrfLanded = The goo shapes itself into a perfect replica of Car and walks away.
        CarPlanetSrfLandedEarring = The goo tries infusing iteslf with the surrounding crystals. It fails miserably.
        CarPlanetSrfLandedVoid = The goo hides in the container.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[mobileMaterialsLab]]
{
    @RESULTS
    {
        CarPlanetInSpaceHigh = The samples make noise faintly resembling Car's Little Song.
        CarPlanetInSpaceLow = The samples make noise faintly resembling Car's Little Song.
        CarPlanetSrfLanded = All the samples become green. Thats... odd.
        CarPlanetSrfLandedEarring = The diamond sample starts radiating a strange energy.
        CarPlanetSrfLandedVoid = The sample bay doors refuse to open.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[temperatureScan]]
{
    @RESULTS
    {
        CarPlanetInSpaceHigh = Still nothing.
        CarPlanetInSpaceLow = Still nothing.
        CarPlanetSrfLanded = No matter how many times you smack it, the thermometer keeps telling you it's 47 degrees.
        CarPlanetSrfLandedVoid = You watch as the liquid in the thermometer sneaks away into some unknown area of the device, as if it's trying to hide.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[barometerScan]]
{
    @RESULTS
    {
        CarPlanetInSpaceHigh = It's space. There's no atmosphere.
        CarPlanetInSpaceLow = It's space. There's no atmosphere.
        CarPlanetSrfLanded = The barometer insists that the atmosphere is 47 atm. It's really annoying.
        CarPlanetSrfLandedVoid = The barometer claims there's no atmosphere. You try smacking it. It still says nothing.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[gravityScan]]
{
    @RESULTS
    {
        CarPlanetInSpaceHigh = Car's influence can be felt from all the way out here. Impressive!
        CarPlanetInSpaceLow = You start noticing the high gravity, but it's not too bad.
        CarPlanetSrfLanded = It says 47g's. You hit it with a hammer and it corrects to 1.47 g's.
        CarPlanetSrfLandedVoid = You look to find that there is a ridiculously high number of negative gravoli particles taking refuge in the scanner.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[seismicScan]]
{
    @RESULTS
    {
        CarPlanetSrfLanded = There's minimal geological activity.
        CarPlanetSrfLandedVoid = The scanner picks up on an anomaly somewhere within the void.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[atmosphereAnalysis]]
{
    @RESULTS
    {
        CarPlanetSrfLanded = There's a dangerously high level of dopamine in the amtosphere.
        CarPlanetSrfLandedVoid = The analysis reveals that the dopamine present everywhere else on the world is lacking here. It still doesn't reccomend breathing here.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[magnometer]]
{
    @RESULTS
    {
        CarPlanetInSpaceHigh = There's certainly a magnetic field.
        CarPlanetInSpaceLow = There's certainly a magnetic field.
    }
}